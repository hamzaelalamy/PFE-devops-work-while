name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: workwhile-dev-backend
  ECR_FRONTEND_REPO: workwhile-dev-frontend
  EKS_CLUSTER_NAME: workwhile-dev

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            work-while-backend/package-lock.json
            work-while-front/package-lock.json

      - name: Install backend dependencies
        working-directory: work-while-backend
        run: npm ci

      - name: Run backend tests
        working-directory: work-while-backend
        run: npm test -- --passWithNoTests

      - name: Run backend lint
        working-directory: work-while-backend
        run: npm run lint -- --max-warnings 99999

      - name: Install frontend dependencies
        working-directory: work-while-front
        run: npm ci

      - name: Build frontend
        working-directory: work-while-front
        run: npm run build

      - name: Run frontend lint
        working-directory: work-while-front
        run: npm run lint -- --max-warnings 99999

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_tag=${SHORT_SHA}-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG ./work-while-backend
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_BACKEND_REPO:latest
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG ./work-while-front
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Set ECR URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ecr_url=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Deploy to EKS
        run: |
          ECR_URL=${{ steps.ecr.outputs.ecr_url }}
          cd k8s/overlays/ecr
          kustomize edit set image workwhile-backend=$ECR_URL/$ECR_BACKEND_REPO:latest
          kustomize edit set image workwhile-frontend=$ECR_URL/$ECR_FRONTEND_REPO:latest
          cd ${{ github.workspace }}
          kubectl apply -k k8s/overlays/ecr/
          kubectl rollout status deployment/backend -n workwhile --timeout=5m
          kubectl rollout status deployment/frontend -n workwhile --timeout=5m
          git checkout k8s/overlays/ecr/kustomization.yaml
